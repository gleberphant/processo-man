{{ define "page" }}
<main class="container mt-5">
	<div class="container">
		<div class="jumbotron jumbotron-fluid">
			<div class="container">
				<h1 class="display-5">{{ if eq .Tarefa.UUID.String "00000000-0000-0000-0000-000000000000" }} Criar Tarefa {{ else }} Editar Tarefa {{ end }}</h1>
				<p class="lead"> Insira os detalhes da tarefa</p>

			</div>
		</div>

		<!-- Se o UUID for válido (edição), manda o POST para editar, senão manda para criar -->
		<form method="POST" action="{{ if eq .Tarefa.UUID.String "00000000-0000-0000-0000-000000000000" }}
			/tarefas/criar{{ else }}/tarefas/{{ .Tarefa.UUID }}/editar {{ end }}">

			<!-- Campo oculto para enviar o UUID -->
			<input type="hidden" name="uuid" value="{{ if .Tarefa.UUID }}{{ .Tarefa.UUID }}{{ end }}">

			<div class="mb-3">
				<label for="Nome" class="form-label">Nome</label>
				<input type="text" class="form-control" id="Nome" name="Nome" placeholder="Digite o nome da tarefa"
					required value="{{ .Tarefa.Nome }}" autofocus>
			</div>

			<div class="mb-3">
				<label for="ProcessoUUID" class="form-label">UUID do Processo: {{ .Tarefa.ProcessoUUID }}</label>
				<select class="form-control" id="ProcessoUUID" name="ProcessoUUID" required>
					<option value="{{ Tarefa.ProcessoUUID }}" selected > {{ Tarefa.ProcessoUUID }}</option>
					{{ range .Processos }}
						<option value="{{ .UUID }}" {{ if eq .UUID $.Tarefa.ProcessoUUID }}selected{{ end }}>
							{{ .Nome }} - {{ .UUID }}
						</option>
					{{ end }}
				</select>

			</div>

			<div class="mb-3">
				<label for="ResponsavelUUID" class="form-label">UUID do Responsável</label>
				<select class="form-control" id="ResponsavelUUID" name="ResponsavelUUID" required>
					<option value="" disabled >Selecione um responsável...</option>
					{{ range .Usuarios }}
						<option value="{{ .UUID }}" {{ if eq .UUID $.Tarefa.ResponsavelUUID }}selected{{ end }}>
							{{ .Nome }} - {{ .UUID }}
						</option>
					{{ end }}
				</select>
			</div>

			<div class="mb-3">
				<label for="Comentarios" class="form-label">Comentários</label>
				<textarea class="form-control" id="Comentarios" name="Comentarios"
					rows="3">{{ .Tarefa.Comentarios }}</textarea>
			</div>

			<div class="mb-4"></div>
			<button type="submit" class="btn btn-primary btn-lg">
				Salvar Tarefa
			</button>
		</form>
	</div>
</main>
{{ end }}

{{ define "title" }}Tarefa - Projeto Go{{ end }}
