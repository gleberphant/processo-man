{{define "page"}}
<main class="container mt-5">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">Lista de Usuários</h2>
            <form id="form-criar-usuario" method="get" action="/usuario/criar" style="display:inline;">
                <button onclick="onClickNovo()" class="btn btn-primary mb-2">Novo</button>
            </form>
        </div>
        <section class="card">




            <div class="table-responsive">
                <table class="table align-middle table-striped table-hover mb-0">
                    <thead>
                        <tr>
                            <th>UUID</th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th></th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody>

                        {{ range . }}
                        <tr>
                            <td>{{ .UUID }}</td>
                            <td>{{ .Nome }}</td>
                            <td>{{ .Email }}</td>
                            <td>-</td>

                            <td>
                                <form id="form-editar-{{.UUID}}" method="get" action="/usuario/editar"
                                    style="display:inline;">
                                    <input type="hidden" name="uuid" value="{{.UUID}}" />
                                    <button type="button" onclick="onClickEditar('{{.UUID}}')"
                                        class="btn btn-warning mb-2">
                                        Editar
                                    </button>
                                </form>
                                <form id="form-deletar-{{.UUID}}" method="post" action="/usuario/deletar"
                                    style="display:inline;">
                                    <input type="hidden" name="uuid" value="{{.UUID}}" />
                                    <button type="button" onclick="onClickDeletar('{{.UUID}}')"
                                        class="btn btn-danger mb-2">
                                        Deletar
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {{ end }}
                    </tbody>
                </table>
            </div>
        </section>

        <!-- meus scripts javascript -->
        <script>
            function onClickDeletar(id) {
                let resposta = confirm("Tem certeza que deseja Deletar ID=" + id + " ??")

                if (resposta) {
                    document.getElementById('form-deletar-' + id).submit();
                }

            }

            function onClickEditar(id) {
                document.getElementById('form-editar-' + id).submit();
            }

            function onClickNovo() {
                document.getElementById('form-criar-usuario').submit();
            }

        </script>
</main>

{{end}}

{{define "title"}}Index - Projeto Go{{end}}
